
services:
  dev:
    depends_on:
      server:
        condition: service_started
    container_name: dev
    build:
      dockerfile: dev.dockerfile
      context: .
    volumes:
      - server:/workspace/
      - ${HOME}/.aws:/root/.aws:ro
      - ${HOME}/.gitconfig:/root/.gitconfig:ro
      - ${HOME}/.git-credentials:/root/.git-credentials:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
    privileged: true
    command: ["bash", "-lc", "sleep infinity"]

  server:
    build:
      dockerfile: .devcontainer/server.dockerfile
      context: ./..
    environment:
      - STACK=${STACK:-local}
    volumes:
      - server:/server/
      - ${HOME}/.aws:/root/.aws:ro
    ports:
      - "8000:8000"
    restart: always

  database:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: local_db
      POSTGRES_USER: local_db
      POSTGRES_PASSWORD: "LOCAL-DEVELOPMENT"
    ports:
      - "5432:5432"  
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local_db -d local_db"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  server:
  postgres_data: